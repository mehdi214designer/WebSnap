<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebSnap</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header class="header">
    <div class="brand">
      <div class="logo">
        <span class="logo-square logo-1"></span>
        <span class="logo-square logo-2"></span>
        <span class="logo-square logo-3"></span>
        <span class="logo-square logo-4"></span>
      </div>
      <div class="brand-text">
        <h1>WebSnap</h1>
        <span class="version">v0.1</span>
      </div>
    </div>
    <button class="icon-btn" id="settings-btn" title="Settings" aria-label="Settings">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
    </button>
  </header>

  <main class="main">
    <section class="section">
      <label class="label">Viewport</label>
      <div class="viewport-grid">
        <button class="viewport-btn" data-width="1920">
          <span class="vp-icon"></span>
          <span class="vp-w">1920</span>
        </button>
        <button class="viewport-btn active" data-width="1440">
          <span class="vp-icon"></span>
          <span class="vp-w">1440</span>
        </button>
        <button class="viewport-btn" data-width="1024">
          <span class="vp-icon"></span>
          <span class="vp-w">1024</span>
        </button>
        <button class="viewport-btn" data-width="768">
          <span class="vp-icon"></span>
          <span class="vp-w">768</span>
        </button>
        <button class="viewport-btn" data-width="390">
          <span class="vp-icon"></span>
          <span class="vp-w">390</span>
        </button>
        <button class="viewport-btn" data-width="current" id="vp-current">
          <span class="vp-icon"></span>
          <span class="vp-w">Current</span>
        </button>
      </div>
    </section>

    <section class="section">
      <label class="label">Capture mode</label>
      <div class="segment">
        <button class="segment-btn active" data-mode="full">Full page</button>
        <button class="segment-btn" data-mode="viewport">Viewport only</button>
        <button class="segment-btn" data-mode="selection">Selection</button>
      </div>
    </section>

    <section class="section">
      <label class="label">Theme override</label>
      <div class="segment">
        <button class="segment-btn active" data-theme="auto">Auto</button>
        <button class="segment-btn" data-theme="light">Light</button>
        <button class="segment-btn" data-theme="dark">Dark</button>
      </div>
    </section>

    <div class="actions">
      <button class="btn btn-primary" id="capture-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
        <span>Capture</span>
      </button>
      <button class="btn btn-secondary" id="abort-btn" hidden>Cancel</button>
    </div>

    <div class="progress" id="progress" hidden>
      <div class="progress-ring">
        <svg viewBox="0 0 40 40">
          <circle class="progress-ring-bg" cx="20" cy="20" r="16" />
          <circle class="progress-ring-fg" cx="20" cy="20" r="16" />
        </svg>
        <span class="progress-pct" id="progress-pct">0%</span>
      </div>
      <div class="progress-label" id="progress-label">Starting...</div>
    </div>

    <div class="result" id="result" hidden>
      <div class="result-header">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        <span>Capture ready</span>
      </div>
      <div class="result-meta" id="result-meta"></div>
      <div class="result-actions">
        <button class="btn btn-primary" id="download-btn">Download .wsnap</button>
        <button class="btn btn-secondary" id="copy-btn">Copy to clipboard</button>
      </div>
      <div class="result-hint">Drop the file or paste into the Figma WebSnap plugin.</div>
    </div>

    <section class="section recent" id="recent-section" hidden>
      <label class="label">Recent</label>
      <ul class="recent-list" id="recent-list"></ul>
    </section>
  </main>

  <footer class="footer">
    <span class="footer-text">No paywall. No relay. Your captures stay local.</span>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
